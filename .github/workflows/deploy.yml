name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: Proyecto2/my-website

      - name: Build website
        # Aquí le decimos que ignore los warnings del Progress Plugin que vimos antes
        run: npm run build
        working-directory: Proyecto2/my-website
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Proyecto2/my-website/build